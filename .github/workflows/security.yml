name: security-audit

# Varredura de dependências vulneráveis (advisória — não bloqueia o deploy,
# que é feito pela Vercel). Roda a cada push/PR e semanalmente.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 9 * * 1" # toda segunda 09:00 UTC

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar pip-audit
        run: pip install pip-audit
      - name: Auditar dependências
        continue-on-error: true
        run: pip-audit -r requirements.txt --desc
